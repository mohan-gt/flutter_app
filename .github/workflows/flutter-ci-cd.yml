  build_android:
    runs-on: ubuntu-latest
    # needs: [test, code_quality, security_scan]
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      # ✅ Setup Java (required for Gradle stability)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
  
      # ✅ Setup Gradle (handles caching automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
  
      # ✅ Cache Flutter dependencies
      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
  
      # ✅ Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
  
      # ✅ Install dependencies
      - name: Get Dependencies
        run: flutter pub get
  
      # ✅ Clean (avoids corrupted Gradle states)
      - name: Clean Build
        run: flutter clean
  
      # ✅ Fix: Retry mechanism for Gradle 504 issue
      - name: Build APK (Retry enabled)
        run: |
          for i in 1 2 3; do
            flutter build apk --release && break || sleep 20
          done
  
      # ✅ Upload Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk  
          
  maestro_tests:
    runs-on: [self-hosted, Windows, X64, gpu, android, maestro]
    needs: build_android
    env:
      ANDROID_HOME: "C:\\Android\\Sdk"
      ANDROID_AVD_HOME: "C:\\Android\\avd"
      MAESTRO_CLI_NO_ANALYTICS: "true"
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
  
      - name: Setup PATH
        shell: cmd
        run: |
          echo %ANDROID_HOME%\platform-tools>>%GITHUB_PATH%
          echo %ANDROID_HOME%\emulator>>%GITHUB_PATH%
          echo %ANDROID_HOME%\cmdline-tools\latest\bin>>%GITHUB_PATH%
          echo C:\maestro\bin>>%GITHUB_PATH%
  
      - name: Debug Environment
        shell: cmd
        run: |
          echo JAVA_HOME=%JAVA_HOME%
          where java
          java -version
          adb version
          maestro --version
  
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk
  
      - name: Verify APK
        shell: cmd
        run: dir /s apk
  
      - name: Wait for Emulator
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "Waiting for device to come online..."
          $timeout = 300
          $elapsed = 0
  
          while ($elapsed -lt $timeout) {
            $state = (& adb get-state) 2>&1
            $state = "$state".Trim()
            Write-Host "State: $state"
            if ($state -eq "device") {
              Write-Host "Device online."
              break
            }
            Start-Sleep -Seconds 5
            $elapsed += 5
          }
  
          if ($elapsed -ge $timeout) {
            Write-Host "Timed out waiting for device"
            exit 1
          }
  
          Write-Host "Waiting for boot_completed..."
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            $boot = (& adb shell getprop sys.boot_completed) 2>&1
            $boot = "$boot".Trim()
            Write-Host "boot=$boot"
            if ($boot -eq "1") {
              Write-Host "Emulator boot completed"
              break
            }
            Start-Sleep -Seconds 5
            $elapsed += 5
          }
  
          if ($elapsed -ge $timeout) {
            Write-Host "Timed out waiting for boot_completed"
            exit 1
          }
  
      - name: Install APK
        shell: cmd
        run: adb install -r apk\app-release.apk
  
      - name: Run Maestro Tests
        shell: cmd
        run: maestro test %GITHUB_WORKSPACE%\maestro-tests
  
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            maestro-report*
            **/*.log
            **/*.xml
            
