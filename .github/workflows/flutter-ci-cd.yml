  build_android:
    runs-on: ubuntu-latest
    # needs: [test, code_quality, security_scan]
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      # ✅ Setup Java (required for Gradle stability)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
  
      # ✅ Setup Gradle (handles caching automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
  
      # ✅ Cache Flutter dependencies
      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
  
      # ✅ Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
  
      # ✅ Install dependencies
      - name: Get Dependencies
        run: flutter pub get
  
      # ✅ Clean (avoids corrupted Gradle states)
      - name: Clean Build
        run: flutter clean
  
      # ✅ Fix: Retry mechanism for Gradle 504 issue
      - name: Build APK (Retry enabled)
        run: |
          for i in 1 2 3; do
            flutter build apk --release && break || sleep 20
          done
  
      # ✅ Upload Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk  

  maestro_tests:
    runs-on: [self-hosted, Windows, X64, gpu, android, maestro]
    needs: build_android
    env:
      JAVA_HOME: C:\Users\Hi\AppData\Local\Programs\Eclipse Adoptium\jdk-17.0.19.10-hotspot
      ANDROID_HOME: C:\Users\Hi\AppData\Local\Android\Sdk
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Configure Environment
        shell: cmd
        run: |
          echo %JAVA_HOME%\bin>>%GITHUB_PATH%
          echo %ANDROID_HOME%\platform-tools>>%GITHUB_PATH%
          echo %ANDROID_HOME%\emulator>>%GITHUB_PATH%
          echo C:\maestro\bin>>%GITHUB_PATH%
  
      - name: Verify Runner
        shell: cmd
        run: |
          set JAVA_HOME=C:\Users\Hi\AppData\Local\Programs\Eclipse Adoptium\jdk-17.0.19.10-hotspot
          set ANDROID_HOME=C:\Users\Hi\AppData\Local\Android\Sdk
      
          set PATH=%JAVA_HOME%\bin;%ANDROID_HOME%\platform-tools;%ANDROID_HOME%\emulator;C:\maestro\bin;%PATH%
      
          echo JAVA_HOME=%JAVA_HOME%
          echo ANDROID_HOME=%ANDROID_HOME%
      
          where java
          java -version
      
          where adb
          adb version
      
          where maestro
          maestro --version
  
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk
  
      - name: Verify APK
        shell: cmd
        run: |
          dir /s apk
  
      - name: Install APK
        shell: cmd
        run: |
          adb install -r apk\app-release.apk
  
      - name: Run Maestro Tests
        shell: cmd
        run: |
          maestro test maestro
            
