name: Flutter CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  FLUTTER_VERSION: "3.22.0"

jobs:

  # ✅ 1. SETUP & DEPENDENCIES
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Verify Installation
        run: flutter doctor

      - name: Install Dependencies
        run: flutter pub get

  # ✅ 2. UNIT & WIDGET TESTING
  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Run Tests
        run: flutter test --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ✅ 3. CODE QUALITY (LINT + FORMAT)
  code_quality:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Format Check
        run: dart format --set-exit-if-changed .

  # ✅ 4. SECURITY SCANNING
  security_scan:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      # ✅ Dependency Vulnerability Scan
      - name: Install Dart Dependency Checker
        run: dart pub global activate pana

      - name: Run Dependency Scan
        run: |
          pana . > pana-report.txt

      # ✅ Secret scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # ✅ Upload reports
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: "*.txt"

  # ✅ 5. BUILD ANDROID APK
  build_android:
    runs-on: ubuntu-latest
    needs: [test, code_quality, security_scan]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ✅ 6. BUILD IOS (MAC RUNNER)
  build_ios:
    runs-on: macos-latest
    needs: [test, code_quality, security_scan]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Build iOS (No signing)
        run: flutter build ios --release --no-codesign

  # ✅ 7. FIREBASE APP DISTRIBUTION
  deploy_firebase:
    runs-on: ubuntu-latest
    needs: build_android
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Deploy to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app-release.apk

  # ✅ 8. OPTIONAL: GOOGLE PLAY STORE DEPLOY
  deploy_playstore:
    runs-on: ubuntu-latest
    needs: build_android
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.PLAYSTORE_JSON }}
          packageName: com.example.app
          releaseFiles: app-release.apk
          track: internal

  # ✅ 9. OPTIONAL: APPLE TESTFLIGHT (FASTLANE)
  deploy_testflight:
    runs-on: macos-latest
    needs: build_ios
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Fastlane
        run: gem install fastlane

      - name: Deploy to TestFlight
        run: fastlane ios beta
