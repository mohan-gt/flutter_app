  build_android:
    runs-on: ubuntu-latest
    # needs: [test, code_quality, security_scan]
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      # ✅ Setup Java (required for Gradle stability)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
  
      # ✅ Setup Gradle (handles caching automatically)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
  
      # ✅ Cache Flutter dependencies
      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
  
      # ✅ Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
  
      # ✅ Install dependencies
      - name: Get Dependencies
        run: flutter pub get
  
      # ✅ Clean (avoids corrupted Gradle states)
      - name: Clean Build
        run: flutter clean
  
      # ✅ Fix: Retry mechanism for Gradle 504 issue
      - name: Build APK (Retry enabled)
        run: |
          for i in 1 2 3; do
            flutter build apk --release && break || sleep 20
          done
  
      # ✅ Upload Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk  

  maestro_tests:
    runs-on: [self-hosted, Windows, X64, gpu, android, maestro]
    needs: build_android
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk
  
      - name: Verify files
        shell: cmd
        run: dir /s apk
  
      - name: Verify emulator
        shell: cmd
        run: adb devices
  
      - name: Install APK
        shell: cmd
        run: |
          adb uninstall com.joshuamdeguzman.circleci_flutter
          adb install -r apk\app-release.apk
  
      - name: Verify Maestro
        shell: cmd
        run: maestro --version
  
      - name: Run Maestro Tests
        shell: cmd
        run: |
          mkdir reports
          maestro test maestro\all.yaml --format junit --output reports
  
      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: reports

  # ✅ 6. BUILD IOS (MAC RUNNER)
  build_ios:
    runs-on: macos-latest
    # needs: [test, code_quality, security_scan]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Build iOS (No signing)
        run: flutter build ios --release --no-codesign
        
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

