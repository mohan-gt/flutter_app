appId: com.daivbharathi.daiv
---
- assertVisible: "Home"
- takeScreenshot: "01_home_screen"

# Swipe up to reveal Book Puja section
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
- takeScreenshot: "02_book_puja_visible"

# PUJA 1 — Maha Rudrabhisheka
- tapOn:
    point: "22%,54%"
- takeScreenshot: "03_maha_rudrabhisheka_detail"

# Select ₹501 Per Person
- assertVisible: "₹ 501.0\nPer Person"
- takeScreenshot: "001_per_person_option_visible"
 
- tapOn: "₹ 501.0\nPer Person"
- takeScreenshot: "002_per_person_selected"
 
- assertVisible: "Book"
- takeScreenshot: "003_book_button_visible"
 
- tapOn: "Book"
- takeScreenshot: "004_after_tap_book"
 
- assertVisible: "Proceed to Payment"
- takeScreenshot: "005_proceed_to_payment_visible"
 
- tapOn: "Proceed to Payment"
- takeScreenshot: "006_payment_screen_opened"
 
- tapOn:
    id: "back"
- takeScreenshot: "007_back_from_payment"

# Option 2: ₹1501 — 4 Family Members
- assertVisible: "₹ 1501.0\n4 Family members"
- takeScreenshot: "008_family_option_visible"
 
- tapOn: "₹ 1501.0\n4 Family members"
- takeScreenshot: "009_family_option_selected"
 
- assertVisible: "Book"
- takeScreenshot: "010_book_button_visible_family"
 
- tapOn: "Book"
- takeScreenshot: "011_after_tap_book_family"
 
- assertVisible: "Proceed to Payment"
- takeScreenshot: "012_proceed_to_payment_visible_family"
 
- tapOn: "Proceed to Payment"
- takeScreenshot: "013_payment_screen_opened_family"
 
- tapOn: "back"
- takeScreenshot: "014_back_from_payment_family"
 
- tapOn: "back"
- takeScreenshot: "015_back_to_puja_listing"

