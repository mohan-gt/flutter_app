appId: com.daivbharathi.daiv
---
# LOGIN FLOW — Mobile Number + OTP
# Test mobile : 8122857394
# Test OTP    : 0000

- launchApp
- takeScreenshot: "001_app_launched"

- assertVisible: "English"
- tapOn: "English"
- takeScreenshot: "002_english_selected"

- assertVisible: "Continue\nContinue"
- tapOn: "Continue\nContinue"
- takeScreenshot: "003_continue_tapped"

- assertVisible: "onboarding_skip\nSkip"
- tapOn: "onboarding_skip\nSkip"
- takeScreenshot: "004_skip_tapped"

- assertVisible: "Let's Start\nLet's Start"
- tapOn: "Let's Start\nLet's Start"
- takeScreenshot: "005_lets_start_tapped"

# Enter phone number
- assertVisible: "login_mobile_number"
- tapOn: "login_mobile_number"
- takeScreenshot: "006_phone_field_focused"

- inputText: "8122857394"
- takeScreenshot: "007_phone_entered"

- assertVisible: "Generate OTP\nGenerate OTP"
- tapOn: "Generate OTP\nGenerate OTP"
- takeScreenshot: "008_otp_requested"

# Enter OTP
- assertVisible: "login_otp_field"
- tapOn: "login_otp_field"
- takeScreenshot: "009_otp_field_focused"

- inputText: "0000"
- takeScreenshot: "010_otp_entered"

# Landed on Home
- assertVisible: "Home"
- takeScreenshot: "011_home_screen_verified"
