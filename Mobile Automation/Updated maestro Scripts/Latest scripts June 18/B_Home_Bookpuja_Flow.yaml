# FLOW NAME : Home → Book Poojas → Puja Booking (Per Person + Family)
# MODULE    : Puja Booking
# APP       : com.daivbharathi.daiv (Daiv / FaithSeva)
# ----------------------------------------------------------------
# PURPOSE   : Book all 5 home-screen poojas end-to-end, covering both
#             "Per Person" and "Family Members" pricing, devotee
#             details entry (name / gotra / rashi / nakshatra),
#             Add More / Remove devotee rows, and exit-confirm dialog.
# DEVOTEE   : Name "Lokesh" / "Lokesh Pattubala", Gotra "Pattubala",
#             Rashi "MESHA", Nakshatra "BHARANI"
# NOTE      : Stops at Proceed to Payment — no real transaction.
# ════════════════════════════════════════════════════════════════
- assertVisible: "Home"
- takeScreenshot: "001_home_screen"

# Swipe up to reveal Book Puja section
- swipe:
    direction: UP
    duration: 250
- takeScreenshot: "002_book_puja_visible"

