appId: com.daivbharathi.daiv
---

# ── HOME → STORE → PUJA KITS FLOW
- assertVisible: "Home"
- assertVisible: "Faith"
- tapOn: "Faith"
- takeScreenshot: "001_faith_tab_opened"

- assertVisible: "Store"
- tapOn: "Store"
- takeScreenshot: "002_store_opened"

# Diwali Mahalakshmi Puja Kit
- assertVisible: "Diwali Mahalakshmi puja kittttt\nStarts from: ₹466.0"
- tapOn: "Diwali Mahalakshmi puja kittttt\nStarts from: ₹466.0"
- takeScreenshot: "003_diwali_kit_opened"

- assertVisible: "+"
- tapOn: "+"
- takeScreenshot: "004_diwali_qty_increased"

- assertVisible: "-"
- tapOn: "-"
- takeScreenshot: "005_diwali_qty_decreased"

- swipe:
    direction: UP
    duration: 400
- takeScreenshot: "006_diwali_scrolled_up"
- runFlow:
    when:
      visible: "Add To Cart"
    commands:
      - tapOn: "Add To Cart"
      - waitForAnimationToEnd
      - takeScreenshot: "008_diwali_added_to_cart"

      - tapOn: "Go To Cart"
      - waitForAnimationToEnd
      - takeScreenshot: "009_diwali_cart_screen"

# Path B: Already in cart
- runFlow:
    when:
      notVisible: "Add To Cart"
    commands:
      - tapOn: "Go To Cart"
      - waitForAnimationToEnd
      - takeScreenshot: "009_diwali_cart_screen"

- assertVisible: "Proceed to Checkout"
- tapOn: "Proceed to Checkout"
- takeScreenshot: "009_diwali_checkout_screen"

- tapOn:
    text: "back"
- takeScreenshot: "010_diwali_back_1"

- tapOn:
    text: "back"
- takeScreenshot: "011_diwali_back_to_store"

