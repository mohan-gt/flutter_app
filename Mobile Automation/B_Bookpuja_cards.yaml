appId: com.daivbharathi.daiv
---

- assertVisible:
    text: "Home"
- waitForAnimationToEnd
- takeScreenshot: "01_home_screen"

# ── Swipe up to reveal Book Puja section ──
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "02_book_puja_visible"

# ════════════════════════════════════
# ── PUJA 1 — Maha Rudrabhisheka ──
# Inspector box: (26,1155)→(458,1437) | center: 242/1080=22%, 1296/2400=54%
# ════════════════════════════════════
- tapOn:
    point: "22%,54%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "03_maha_rudrabhisheka_detail"

# ── Select ₹501 Per Person ──
- tapOn:
    point: "26%,67%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "04_amount_501_selected"

# ── Tap BOOK ──
- tapOn:
    text: "Book"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "05_family_details_screen"

# ── Tap Proceed to Payment ──
