appId: com.daiv.ai
---
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    text: "Home"
- tapOn:
    text: "Faith"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Seva"
- waitForAnimationToEnd:
    timeout: 4000
- swipe:
    direction: DOWN
    duration: 800
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Show More"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: "00_all_temples_screen"

# Scroll to very top first
- swipe:
    direction: DOWN
    duration: 3000

# TEMPLE 1 - tap center of first card
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: "01_temple1_open"
- tapOn:
    point: "7%,6%"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: "01_temple1_back"

