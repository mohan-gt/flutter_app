appId: com.daivbharathi.daiv
---
- waitForAnimationToEnd:
    timeout: 4000jjj
- takeScreenshot: "01_home_screen"
- assertVisible:
    text: "Home"
- tapOn:
    text: "Faith"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Seva"
- takeScreenshot: "02_seva_screen"
- tapOn:
    text: "Store"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: "03_store_screen"

# Scroll down to bring Fruits & Sweets 8 to top
- swipe:
    direction: UP
    duration: 800
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "04_fruits_section_visible"

# FRUIT KIT 1 - qwertyui1 (left card 26%,33%)
- tapOn:
    point: "26%,33%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "05_fruitkit1_open"
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "06_fruitkit1_details"
- tapOn:
    point: "7%,6%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "07_fruitkit1_back"

# FRUIT KIT 2 - Laddo desi ghee (right card 74%,33%)
- tapOn:
    point: "74%,33%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "08_fruitkit2_open"
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "09_fruitkit2_details"
- tapOn:
    point: "7%,6%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "10_fruitkit2_back"

# Swipe LEFT to reveal kit3
- swipe:
    start: "72%,33%"
    end: "26%,33%"
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: "11_after_swipe_kit3_visible"

# FRUIT KIT 3 - Laddo (RIGHT card 74%,30% after swipe)
- tapOn:
    point: "74%,30%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "12_fruitkit3_open"
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "13_fruitkit3_details"
- tapOn:
    point: "7%,6%"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "26%,70%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "16_fruit9kit1_open"
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "17_fruit9kit1_details"
- tapOn:
    point: "7%,6%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "18_fruit9kit1_back"
- tapOn:
    text: "back"
