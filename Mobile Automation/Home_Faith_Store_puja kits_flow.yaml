appId: com.daiv.ai
---
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: "01_home_screen"
- assertVisible:
    text: "Home"
- tapOn:
    text: "Faith"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: "Seva"
- takeScreenshot: "02_seva_screen"
- tapOn:
