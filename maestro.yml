✅ 7. EXECUTION FLOW (END-TO-END)
	1. Trigger pipeline
	2. Build APK (GitHub Runner)
	3. Upload APK
	4. GPU runner picks job
	5. Emulator starts
	6. APK installs
	7. Maestro runs tests
	8. Results uploaded
