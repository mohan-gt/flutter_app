✅ 5. UPDATE YOUR PIPELINE (IMPORTANT)
You already have build_android ✅
Now we add automation job after APK build

✅ NEW JOB: maestro_tests



YAML
maestro_tests:
 name: Maestro Automation (GPU)
 runs-on: [self-hosted, windows, gpu]
 needs: build_android

 steps:

 - name: Checkout Code
 uses: actions/checkout@v4

 # ✅ Download APK from previous job
 - name: Download APK
 uses: actions/download-artifact@v4
 with:
 name: android-apk
 path: apk/

 # ✅ Start Emulator
 - name: Start Emulator
 shell: cmd
 run: |
 start "" emulator -avd ci-emulator -gpu auto -no-snapshot -no-boot-anim
 timeout /t 40

 # ✅ Wait for Device
 - name: Wait for device
 shell: cmd
 run: |
 adb wait-for-device
 adb devices

 # ✅ Install APK
 - name: Install APK
 shell: cmd
 run: |
 adb install -r apk\app-release.apk

 # ✅ Run Maestro Tests
 - name: Run Maestro Tests
 shell: cmd
 run: |
 maestro test maestro/

 # ✅ Collect Logs
 - name: Save logs
 run: |
 mkdir test-output
 echo "Logs collected" > test-output/result.txt

 # ✅ Upload Results
 - name: Upload Test Results
 uses: actions/upload-artifact@v4
 with:
 name: maestro-results
 path: test-output/
Show more lines

✅ 6. ENTERPRISE IMPROVEMENTS (VERY IMPORTANT)
✅ 6.1 Emulator Stability
Add before tests:



Shell
adb shell settings put global window_animation_scale 0
adb shell settings put global transition_animation_scale 0
adb shell settings put global animator_duration_scale 0
Show more lines

✅ 6.2 Retry Mechanism



YAML
- name: Run Maestro Tests
 run: |
 for /L %%i in (1,1,3) do (
 maestro test maestro/ && exit /b 0
 echo Retry %%i failed
 )
 exit 1
Show more lines

