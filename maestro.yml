✅ 1. HIGH-LEVEL ARCHITECTURE
GitHub Actions (CI Pipeline)
        |
        |  (APK built)
        ↓
Upload Artifact (APK)
        |
        ↓
Self-Hosted Runner (Windows GPU Machine)
        |
        ├── Android Emulator (GPU accelerated)
        ├── Maestro Test Execution
        └── Test Reports (logs/screenshots)
        |
        ↓
Upload Results back to GitHub Actions


✅ 2. GPU MACHINE SETUP (WINDOWS)
✅ 2.1 Install Required Software
Install everything on your Windows GPU desktop:
1. Java



Shell
Download: https://adoptium.net/
Install: JDK 17
Show more lines
2. Android Studio (MANDATORY)
Install:
	• Android SDK
	• Android SDK Platform Tools
	• Android Emulator
	• Enable Hardware Acceleration (WHPX)
3. Environment Variables
Set in System Environment Variables:
ANDROID_HOME = C:\Users\<user>\AppData\Local\Android\Sdk
PATH add:
%ANDROID_HOME%\platform-tools
%ANDROID_HOME%\emulator
%ANDROID_HOME%\tools

4. Create Emulator (ONE device)
Open CMD:



Shell
sdkmanager "system-images;android-34;google_apis;x86_64"
avdmanager create avd -n ci-emulator -k "system-images;android-34;google_apis;x86_64"
Show more lines

5. Start Emulator (Manual test)



Shell
emulator -avd ci-emulator -gpu auto -no-snapshot -no-boot-anim
Show more lines
Verify:



Shell
adb devices
Show more lines

