✅ 3. SELF-HOSTED RUNNER SETUP (CRITICAL)
Go to:
GitHub Repo → Settings → Actions → Runners → New Self Hosted Runner

Choose:
OS: Windows
Architecture: x64

Run on GPU machine:



Shell
mkdir actions-runner
cd actions-runner

# Download runner ZIP from GitHub UI

config.cmd --url https://github.com/<org>/<repo> --token <token>

# IMPORTANT LABEL
Enter:
self-hosted, windows, gpu

run.cmd
Show more lines

✅ Runner must stay running
✅ This machine will execute automation jobs

